services:
  - type: web
    name: fir-assistant
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemini-2.5-flash-lite
      - key: LLM_FALLBACK_MODELS
        value: gemini-2.5-flash
      - key: LLM_TIMEOUT_MS
        value: 18000
